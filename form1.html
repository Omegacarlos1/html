<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form page</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form>
      <label for="">FullName</label>
      <input type="text" placeholder="Enter your FullName" /><br />
      <label for="Tel">phone number</label><br />
      <input type="text" placeholder="enter your phone number" /><br />
      <label for="">Email</label><br />
      <input type="text" placeholder="Enter your correct email" /><br />
      <label for="">Gender</label><br />
      <input type="radio" value="Male" />Male<br />
      <input type="radio" value="Female" />female<br />
      <label for="">Language</label><br />
      <input type="checkbox" value="English" />Eglish <br />
      <input type="checkbox" value="French" />French <br />
      <input type="checkbox" value="Spanish" />Spanish <br />
      <label for="">comment</label><br />
      <textarea name="comment" rows="4" cols="30"></textarea><br />
      <input type="submit" value="submit" />
    </form>
  </body>
</html>
